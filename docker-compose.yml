# PeopleSense — Docker Compose
# Default profile: SQLite (no external deps, dev-friendly)
# Production profile: docker compose --profile postgres up

version: "3.9"

services:

  # ---------- API ----------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend/storage:/app/backend/storage
    env_file:
      - .env
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      # Override for postgres profile
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./backend/storage/peoplesense.db}
    depends_on:
      db:
        condition: service_healthy
        required: false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ---------- Frontend ----------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped

  # ---------- PostgreSQL (--profile postgres) ----------
  db:
    image: postgres:16-alpine
    profiles: ["postgres"]
    environment:
      POSTGRES_DB: peoplesense
      POSTGRES_USER: ${POSTGRES_USER:-ps_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ps_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ps_user} -d peoplesense"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------- Redis (--profile redis — for future task queue) ----------
  redis:
    image: redis:7-alpine
    profiles: ["redis"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
